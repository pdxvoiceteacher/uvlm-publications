name: Mint DOI

on:
  pull_request:
    paths:
      - "papers/**"
  push:
    branches:
      - main
    paths:
      - "papers/**"

jobs:
  mint-doi:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute content hash
        run: python scripts/update_content_hash.py papers/echo-atlas-primer/metadata.yaml

      - name: Validate publication metadata
        run: python scripts/validate_metadata.py papers

      - name: Generate Crossref XML
        env:
          DOI_PREFIX: ${{ secrets.DOI_PREFIX }}
        run: |
          python scripts/generate_crossref_xml.py \
            papers/echo-atlas-primer/metadata.yaml \
            --doi-prefix "${DOI_PREFIX}" \
            --depositor-email "publications@ultraverbaluxmentis.org" \
            --batch-id "${GITHUB_SHA}" \
            --output crossref_deposit.xml

      - name: Validate Crossref XML
        run: python scripts/validate_crossref_xml.py crossref_deposit.xml

      - name: Dry-run deposit (PR safety)
        if: github.event_name == 'pull_request'
        env:
          CROSSREF_USERNAME: ${{ secrets.CROSSREF_USERNAME }}
          CROSSREF_PASSWORD: ${{ secrets.CROSSREF_PASSWORD }}
          DOI_PREFIX: ${{ secrets.DOI_PREFIX }}
        run: |
          python scripts/deposit_crossref.py \
            --metadata papers/echo-atlas-primer/metadata.yaml \
            --xml crossref_deposit.xml \
            --dry-run

      - name: Mint DOI and update registries
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CROSSREF_USERNAME: ${{ secrets.CROSSREF_USERNAME }}
          CROSSREF_PASSWORD: ${{ secrets.CROSSREF_PASSWORD }}
          DOI_PREFIX: ${{ secrets.DOI_PREFIX }}
        run: |
          python scripts/deposit_crossref.py \
            --metadata papers/echo-atlas-primer/metadata.yaml \
            --xml crossref_deposit.xml

      - name: Build publication catalog
        run: python scripts/build_catalog.py

      - name: Build publication knowledge graph
        run: python scripts/build_knowledge_graph.py --catalog registry/catalog.json --papers-dir papers --output registry/knowledge_graph.json

      - name: Validate publication knowledge graph
        run: python scripts/validate_knowledge_graph.py registry/knowledge_graph.json

      - name: Build atlas timeline
        run: python scripts/build_atlas_timeline.py --graph registry/knowledge_graph.json --catalog registry/catalog.json --output registry/atlas_timeline.json

      - name: Validate atlas timeline
        run: python scripts/validate_atlas_timeline.py registry/atlas_timeline.json

      - name: Validate atlas timeline JSON formatting
        run: python -m json.tool registry/atlas_timeline.json >/dev/null

      - name: Run atlas timeline validator regression fixtures
        run: python3 -m unittest tests/test_validate_atlas_timeline.py

      - name: Commit registry updates
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add registry/dois.json registry/publications.json registry/catalog.json registry/knowledge_graph.json registry/atlas_timeline.json registry/deposits papers/echo-atlas-primer/metadata.yaml
          git diff --cached --quiet || git commit -m "Update DOI registries, catalog, graph, and deposit logs"
          git push

      - name: Upload deposit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crossref-deposit-artifacts
          path: |
            crossref_deposit.xml
            papers/echo-atlas-primer/metadata.yaml
            registry/deposits/
            registry/dois.json
            registry/publications.json
            registry/catalog.json
            registry/knowledge_graph.json
            registry/atlas_timeline.json
