<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UVLM Research Atlas</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/layout-base/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>
  </head>
  <body>
    <header class="topbar">
      <h1>UVLM Research Atlas</h1>
      <div class="controls">
        <input id="search" type="search" placeholder="Search nodes (e.g., coherence lattice)" />
        <select id="type-filter">
          <option value="all">All node classes</option>
          <option value="publication">Publication (planet)</option>
          <option value="concept">Concept (star)</option>
          <option value="author">Author (constellation)</option>
          <option value="keyword">Keyword (nebula)</option>
          <option value="series">Series (solar system)</option>
        </select>
        <div class="view-buttons">
          <button id="view-galaxy">Galaxy</button>
          <button id="view-solar">Solar</button>
          <button id="view-orbit">Orbit</button>
        </div>
        <button id="reset">Reset View</button>
      </div>
    </header>

    <main class="layout">
      <section id="graph" aria-label="Knowledge graph visualization"></section>
      <aside class="panel">
        <h2>Node Details</h2>
        <div id="details">
          <p>Select a node to inspect metadata.</p>
        </div>
      </aside>
    </main>

    <script type="module" src="atlas.js"></script>
  </body>
</html>
